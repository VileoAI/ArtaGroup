<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Арта Групп — Центр управления</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="vendor/react.js"></script>
<script src="vendor/react-dom.js"></script>
<script src="vendor/prop-types.js"></script>
<script src="vendor/recharts.js"></script>
<script src="vendor/babel.js"></script>
<style>
  :root{
    --bg:#F4F5F7; --card:#FFFFFF; --ink:#0F1419; --inksoft:#3B4250; --muted:#6B7280;
    --hair:#E8EAEE; --hairsoft:#EFF1F4;
    --lime:#D4FF3D; --lime-ink:#1A2300;
    --mint:#B8DCC8; --mint-soft:#E5F1EB; --mint-deep:#5C8B73;
    --green:#10B981; --green-soft:#D1FAE5; --green-ink:#0B5C45;
    --red:#FF4D4F; --red-soft:#FFE4E6; --red-ink:#7A1417;
    --amber:#F4B740; --amber-soft:#FFF1CF; --amber-ink:#7A4E00;
    --blue:#2A6FDB; --blue-soft:#DBEAFE; --blue-ink:#1E3A8A;
    --lilac:#8B5CF6; --lilac-soft:#EDE9FE; --lilac-ink:#5B21B6;
    --mono:"JetBrains Mono",ui-monospace,Menlo,monospace;
    --shadow:0 1px 0 rgba(15,20,25,.04), 0 0 0 1px rgba(15,20,25,.05);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:"Manrope",-apple-system,system-ui,sans-serif;letter-spacing:-0.01em;
    -webkit-font-smoothing:antialiased;}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#d0d4da;border-radius:999px}
  button{font-family:inherit}
  /* ===== shell ===== */
  .shell{max-width:1480px;margin:0 auto;padding:20px 28px 90px 100px;position:relative;min-height:100vh;}
  @media(max-width:900px){ .shell{padding-left:28px} .rail{display:none} }
  .rail{position:fixed;left:max(18px,calc(50vw - 740px + 18px));top:210px;width:52px;display:flex;flex-direction:column;gap:10px;z-index:40;}
  .railbtn{width:48px;height:48px;border-radius:999px;background:#fff;box-shadow:var(--shadow);border:none;cursor:pointer;
    display:flex;align-items:center;justify-content:center;color:var(--inksoft);transition:.15s;position:relative;}
  .railbtn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(15,20,25,.10);}
  .railbtn.active{background:var(--ink);color:#fff;}
  .railbtn .tip{position:absolute;left:58px;top:50%;transform:translateY(-50%);background:var(--ink);color:#fff;
    font-size:12px;font-weight:600;padding:6px 11px;border-radius:9px;white-space:nowrap;opacity:0;pointer-events:none;transition:.15s;}
  .railbtn:hover .tip{opacity:1;}
  .railnum{position:absolute;right:-2px;top:-2px;width:17px;height:17px;border-radius:999px;background:var(--lime);color:var(--lime-ink);
    font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;}
  /* ===== topbar ===== */
  .topbar{display:flex;align-items:center;gap:12px;margin-bottom:26px;}
  .logo{width:46px;height:46px;border-radius:14px;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex-shrink:0;}
  .nav{display:flex;gap:4px;background:#fff;border-radius:999px;padding:6px;box-shadow:var(--shadow);overflow-x:auto;}
  .nav::-webkit-scrollbar{display:none}
  .navpill{border:none;background:transparent;color:var(--ink);font-size:13.5px;font-weight:600;padding:10px 16px;border-radius:999px;cursor:pointer;white-space:nowrap;transition:.15s;}
  .navpill:hover{background:var(--hairsoft);}
  .navpill.active{background:var(--ink);color:#fff;}
  .navpill .ast{opacity:.55;font-size:11px;margin-left:3px;}
  .search{flex:1;min-width:140px;display:flex;align-items:center;gap:10px;background:#fff;border-radius:999px;padding:11px 18px;box-shadow:var(--shadow);color:var(--muted);font-size:13.5px;white-space:nowrap;overflow:hidden;}
  .search .kbd{margin-left:auto;font-family:var(--mono);font-size:11px;background:var(--hairsoft);border-radius:7px;padding:3px 8px;color:var(--muted);}
  .live{display:flex;align-items:center;gap:8px;background:#fff;border-radius:999px;padding:11px 16px;box-shadow:var(--shadow);font-size:13px;font-weight:700;}
  .live .dot{width:9px;height:9px;border-radius:999px;background:var(--green);position:relative;}
  .live .dot::after{content:"";position:absolute;inset:0;border-radius:999px;background:var(--green);animation:pulse 1.6s infinite;}
  @keyframes pulse{0%{transform:scale(1);opacity:.7}70%{transform:scale(2.1);opacity:0}100%{opacity:0}}
  .avatars{display:flex;align-items:center;}
  .ava{width:34px;height:34px;border-radius:999px;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;margin-left:-9px;}
  .ava:first-child{margin-left:0}
  .iconbtn{width:44px;height:44px;border-radius:999px;background:#fff;box-shadow:var(--shadow);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--inksoft);position:relative;flex-shrink:0;}
  .iconbtn .reddot{position:absolute;top:9px;right:10px;width:8px;height:8px;border-radius:999px;background:var(--red);border:2px solid #fff;}
  .profile{width:44px;height:44px;border-radius:999px;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0;}
  @media(max-width:1150px){ .search,.live,.avatars{display:none} }
  /* ===== breadcrumbs + header ===== */
  .crumbs{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--muted);margin-bottom:10px;flex-wrap:wrap;}
  .crumbs b{color:var(--ink);font-weight:700;}
  .crumbs .sync{display:inline-flex;align-items:center;gap:7px;background:#fff;border-radius:999px;padding:5px 12px;box-shadow:var(--shadow);font-size:12px;font-weight:600;color:var(--inksoft);}
  .crumbs .sync i{width:7px;height:7px;border-radius:999px;background:var(--green);display:inline-block;}
  .pagehead{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;margin-bottom:26px;flex-wrap:wrap;}
  .pagehead h1{font-size:clamp(30px,3.4vw,44px);margin:0;font-weight:800;letter-spacing:-0.03em;line-height:1;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .limebadge{background:var(--lime);color:var(--lime-ink);font-size:12.5px;font-weight:800;padding:7px 13px;border-radius:999px;display:inline-flex;align-items:center;gap:7px;letter-spacing:0;white-space:nowrap;}
  .limebadge i{width:7px;height:7px;border-radius:999px;background:var(--lime-ink);display:inline-block;}
  .headctl{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .datepill{background:#fff;border-radius:999px;padding:12px 18px;box-shadow:var(--shadow);font-size:13.5px;font-weight:700;display:flex;align-items:center;gap:9px;}
  .exportbtn{background:var(--ink);color:#fff;border:none;border-radius:999px;padding:13px 22px;font-size:13.5px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:9px;}
  .exportbtn:hover{opacity:.9}
  /* ===== grid + cards ===== */
  .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px;}
  .c2{grid-column:span 2}.c3{grid-column:span 3}.c4{grid-column:span 4}.c5{grid-column:span 5}
  .c6{grid-column:span 6}.c7{grid-column:span 7}.c8{grid-column:span 8}.c9{grid-column:span 9}.c12{grid-column:span 12}
  @media(max-width:1150px){.c2{grid-column:span 4}.c3{grid-column:span 6}.c4{grid-column:span 6}.c5,.c7{grid-column:span 12}.c6{grid-column:span 6}.c8,.c9{grid-column:span 12}}
  @media(max-width:760px){.c2,.c3,.c4,.c6{grid-column:span 12}}
  .card{background:var(--card);border-radius:24px;box-shadow:var(--shadow);padding:22px;position:relative;}
  .card.tight{padding:18px 20px;}
  .ch{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px;}
  .ch h3{font-size:16px;margin:0;font-weight:800;letter-spacing:-0.02em;}
  .ch p{font-size:12.5px;margin:4px 0 0;color:var(--muted);font-weight:500;}
  .star{color:var(--muted);font-weight:700;font-size:.65em;vertical-align:super;margin-left:1px;}
  .footnote{font-size:11.5px;color:#9AA0A8;margin-top:10px;line-height:1.5;}
  /* chips */
  .chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:5px 11px;border-radius:999px;white-space:nowrap;}
  .chip i{width:6px;height:6px;border-radius:999px;background:currentColor;display:inline-block;}
  .ch-green{background:var(--green-soft);color:var(--green-ink);}
  .ch-red{background:var(--red-soft);color:var(--red-ink);}
  .ch-amber{background:var(--amber-soft);color:var(--amber-ink);}
  .ch-blue{background:var(--blue-soft);color:var(--blue-ink);}
  .ch-lilac{background:var(--lilac-soft);color:var(--lilac-ink);}
  .ch-gray{background:var(--hairsoft);color:var(--muted);}
  .ch-lime{background:var(--lime);color:var(--lime-ink);}
  .ch-mint{background:var(--mint-soft);color:var(--mint-deep);}
  /* hero */
  .hero .hlabel{display:flex;align-items:center;gap:9px;font-size:13.5px;font-weight:700;color:var(--inksoft);}
  .hero .hlabel i{width:8px;height:8px;border-radius:999px;background:var(--green);}
  .hero .hnum{font-size:clamp(44px,4.6vw,62px);font-weight:800;letter-spacing:-0.04em;line-height:1;margin:14px 0 4px;font-feature-settings:"tnum";}
  .hero .hunit{font-size:14px;color:var(--muted);font-weight:600;}
  .hero .hchips{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;}
  /* kcard — компактная метрика */
  .kcard{background:var(--card);border-radius:24px;box-shadow:var(--shadow);padding:20px;display:flex;flex-direction:column;gap:10px;}
  .kcard .kt{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:13px;font-weight:600;color:var(--muted);}
  .kcard .kv{font-size:30px;font-weight:800;letter-spacing:-0.03em;line-height:1;font-feature-settings:"tnum";}
  .kcard .kchips{display:flex;gap:6px;flex-wrap:wrap;}
  .kcard .kchips .chip{font-size:11px;padding:4px 9px;}
  .kcard .knote{font-size:12px;color:var(--muted);font-weight:500;}
  .krow{display:grid;gap:16px;margin-bottom:16px;}
  .krow.n4{grid-template-columns:repeat(4,1fr);}
  .krow.n5{grid-template-columns:repeat(5,1fr);}
  .krow.n6{grid-template-columns:repeat(6,1fr);}
  @media(max-width:1150px){.krow.n4,.krow.n5,.krow.n6{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:700px){.krow.n4,.krow.n5,.krow.n6{grid-template-columns:repeat(2,1fr)}}
  /* pastel mp tiles */
  .tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  @media(max-width:760px){.tiles{grid-template-columns:1fr}}
  .tile{border-radius:20px;padding:18px;display:flex;flex-direction:column;gap:6px;}
  .tile .tn{font-size:13.5px;font-weight:800;display:flex;align-items:center;gap:9px;}
  .tile .tn svg{flex-shrink:0}
  .tile .tv{font-size:26px;font-weight:800;letter-spacing:-0.03em;font-feature-settings:"tnum";}
  .tile .ts{font-size:12px;font-weight:600;opacity:.75;}
  .t-blue{background:var(--blue-soft);color:var(--blue-ink);}
  .t-lilac{background:var(--lilac-soft);color:var(--lilac-ink);}
  .t-yellow{background:var(--amber-soft);color:var(--amber-ink);}
  /* tables */
  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;padding:9px 12px;border-bottom:1px solid var(--hair);}
  td{padding:13px 12px;border-bottom:1px solid var(--hairsoft);}
  tr:last-child td{border-bottom:none;}
  .num{text-align:right;font-variant-numeric:tabular-nums;font-family:var(--mono);font-size:12.5px;white-space:nowrap;}
  .row-warn td{background:var(--red-soft);}
  .row-warn td:first-child{border-radius:12px 0 0 12px;}
  .row-warn td:last-child{border-radius:0 12px 12px 0;}
  .ctag{display:inline-block;font-size:10.5px;font-weight:800;padding:3px 9px;border-radius:7px;background:var(--hairsoft);color:var(--muted);letter-spacing:.3px;}
  table.pl td{padding:11px 12px;}
  table.pl tr.pl-sub td{background:var(--hairsoft);font-weight:800;}
  table.pl tr.pl-sub td:first-child{border-radius:10px 0 0 10px;}
  table.pl tr.pl-sub td:last-child{border-radius:0 10px 10px 0;}
  table.pl tr.pl-net td{background:var(--lime);font-weight:800;color:var(--lime-ink);}
  table.pl tr.pl-net td:first-child{border-radius:10px 0 0 10px;}
  table.pl tr.pl-net td:last-child{border-radius:0 10px 10px 0;}
  table.pl tr.pl-net td.num{color:var(--lime-ink);}
  table.pl td.ded{color:var(--muted);}
  /* feed (события / алёрты) */
  .feed{display:flex;flex-direction:column;}
  .fitem{display:flex;gap:14px;padding:11px 0;position:relative;cursor:default;}
  .fitem.clk{cursor:pointer;border-radius:14px;}
  .fitem.clk:hover{background:var(--hairsoft);margin:0 -10px;padding-left:10px;padding-right:10px;}
  .fic{width:38px;height:38px;border-radius:999px;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;z-index:1;}
  .fitem:not(:last-child) .fic::after{content:"";position:absolute;top:40px;left:50%;width:2px;height:26px;background:var(--hairsoft);}
  .ft{flex:1;min-width:0;}
  .ft .t1{font-size:13.5px;font-weight:700;line-height:1.35;}
  .ft .t2{font-size:12.5px;color:var(--muted);margin-top:2px;line-height:1.4;}
  .ftime{font-family:var(--mono);font-size:11.5px;color:var(--muted);flex-shrink:0;padding-top:2px;}
  .f-green{background:var(--green-soft);color:var(--green-ink);}
  .f-red{background:var(--red-soft);color:var(--red-ink);}
  .f-amber{background:var(--amber-soft);color:var(--amber-ink);}
  .f-blue{background:var(--blue-soft);color:var(--blue-ink);}
  .f-ink{background:var(--ink);color:#fff;}
  /* controls */
  .toggle{display:flex;gap:6px;flex-wrap:wrap;}
  .tg{border:none;background:#fff;box-shadow:var(--shadow);border-radius:999px;padding:8px 15px;font-size:12.5px;font-weight:700;color:var(--inksoft);cursor:pointer;transition:.12s;}
  .tg:hover{background:var(--hairsoft);}
  .tg.active{background:var(--ink);color:#fff;box-shadow:none;}
  .sel{font-family:inherit;font-size:13px;font-weight:600;color:var(--ink);border:none;box-shadow:var(--shadow);background:#fff;border-radius:999px;padding:10px 16px;cursor:pointer;}
  input.sel{cursor:text;}
  .btn{font-family:inherit;font-size:13px;font-weight:700;color:#fff;background:var(--ink);border:none;border-radius:999px;padding:11px 19px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;}
  .btn:hover{opacity:.9}
  .btn.lime{background:var(--lime);color:var(--lime-ink);}
  input[type=range]{width:100%;accent-color:var(--ink);height:6px;}
  /* recs */
  .rec{display:flex;gap:12px;align-items:flex-start;padding:13px 15px;border-radius:16px;background:var(--hairsoft);font-size:13px;line-height:1.45;margin-bottom:9px;font-weight:500;}
  .rec:last-child{margin-bottom:0;}
  .rec .rtag{font-size:10px;font-weight:800;letter-spacing:.4px;padding:4px 9px;border-radius:8px;flex-shrink:0;white-space:nowrap;margin-top:1px;}
  /* compbar (юнит-экономика) */
  .compbar{display:flex;height:44px;border-radius:14px;overflow:hidden;margin:12px 0;}
  .compbar .seg{display:flex;align-items:center;justify-content:center;color:#fff;font-size:11.5px;font-weight:800;min-width:0;white-space:nowrap;overflow:hidden;}
  .leg{display:flex;gap:16px;flex-wrap:wrap;font-size:12.5px;margin-top:6px;}
  .leg span{display:flex;align-items:center;gap:7px;color:var(--muted);font-weight:600;}
  .leg i{width:11px;height:11px;border-radius:4px;display:inline-block;}
  /* mini stat cells */
  .cells{display:grid;gap:12px;}
  .cell{background:var(--hairsoft);border-radius:16px;padding:14px 16px;}
  .cell .l{font-size:12px;color:var(--muted);font-weight:600;}
  .cell .b{font-size:22px;font-weight:800;margin-top:5px;letter-spacing:-0.02em;font-feature-settings:"tnum";}
  .cell .d{font-size:12px;font-weight:600;margin-top:3px;color:var(--muted);}
  /* chain */
  .chain{display:flex;align-items:stretch;gap:0;flex-wrap:wrap;}
  .cnode{flex:1;min-width:210px;border-radius:18px;padding:18px;cursor:pointer;transition:.18s;border:2px solid transparent;}
  .carrow{display:flex;align-items:center;justify-content:center;width:44px;font-size:20px;color:#C2C7CF;}
  .cnode h4{margin:0 0 6px;font-size:14px;font-weight:800;}
  .cnode p{margin:0;font-size:12.5px;line-height:1.45;color:var(--muted);font-weight:500;}
  .cnode .tag{font-size:10.5px;font-weight:800;letter-spacing:.5px;}
  .cn-a{background:var(--lilac-soft);} .cn-a.hot{border-color:var(--lilac);}
  .cn-b{background:var(--blue-soft);} .cn-b.hot{border-color:var(--blue);}
  .cn-c{background:var(--amber-soft);} .cn-c.hot{border-color:var(--amber);}
  /* inbox (коммуникация) */
  .inbox{display:grid;grid-template-columns:250px 360px 1fr;gap:16px;align-items:start;}
  @media(max-width:1150px){.inbox{grid-template-columns:1fr}}
  .chanlist{display:flex;flex-direction:column;gap:4px;}
  .chan{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:14px;border:none;background:transparent;cursor:pointer;font-size:13.5px;font-weight:700;color:var(--inksoft);text-align:left;width:100%;}
  .chan:hover{background:var(--hairsoft);}
  .chan.active{background:var(--ink);color:#fff;}
  .chan .cic{width:34px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .chan .cnt{margin-left:auto;font-family:var(--mono);font-size:11.5px;font-weight:700;background:var(--hairsoft);color:var(--muted);border-radius:999px;padding:2px 9px;}
  .chan.active .cnt{background:rgba(255,255,255,.18);color:#fff;}
  .chanhdr{font-size:10.5px;font-weight:800;letter-spacing:.6px;color:var(--muted);padding:14px 13px 6px;}
  .dlg{padding:14px;border-radius:16px;cursor:pointer;border-left:3px solid transparent;}
  .dlg:hover{background:var(--hairsoft);}
  .dlg.active{background:var(--hairsoft);border-left-color:var(--ink);}
  .dlg .dh{display:flex;justify-content:space-between;gap:10px;align-items:baseline;}
  .dlg .dh b{font-size:13.5px;}
  .dlg .dh span{font-family:var(--mono);font-size:11px;color:var(--muted);}
  .dlg .ds{font-size:13px;font-weight:700;margin-top:3px;}
  .dlg .dp{font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .dlg .dtags{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
  .thread{display:flex;flex-direction:column;min-height:480px;}
  .thr-head{display:flex;align-items:center;gap:13px;padding-bottom:16px;border-bottom:1px solid var(--hairsoft);flex-wrap:wrap;}
  .thr-ava{width:46px;height:46px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0;}
  .thr-head .tn{font-size:16px;font-weight:800;}
  .thr-head .ts{font-size:12.5px;color:var(--muted);font-weight:600;}
  .bubble{background:var(--hairsoft);border-radius:18px;padding:15px 18px;font-size:13.5px;line-height:1.55;max-width:560px;margin-top:16px;font-weight:500;}
  .bub-meta{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:14px;}
  .yourturn{text-align:center;color:var(--muted);font-size:12px;font-weight:600;margin:auto 0 18px;padding-top:30px;}
  .thr-actions{display:flex;gap:9px;flex-wrap:wrap;border-top:1px solid var(--hairsoft);padding-top:15px;}
  .act{border:none;border-radius:999px;padding:11px 17px;font-size:13px;font-weight:700;cursor:pointer;background:#fff;box-shadow:var(--shadow);color:var(--ink);display:inline-flex;align-items:center;gap:8px;}
  .act.lime{background:var(--lime);color:var(--lime-ink);box-shadow:none;}
  /* misc */

const ru = (n,d=0)=> Number(n).toLocaleString('ru-RU',{minimumFractionDigits:d,maximumFractionDigits:d});
const mln = (n,d=1)=> ru(n,d)+" млн ₽";
const pct = (n,d=1)=> ru(n,d).replace('-','−')+" %";
const tys = (n)=> ru(n,0)+" тыс ₽";
const rub = (n)=> ru(n,0)+" ₽";
const pp = (n)=> (n>0?"+":n<0?"−":"")+ru(Math.abs(n),Math.abs(n)%1?1:0)+" пп";
const dlt = (n)=> (n>0?"+":n<0?"−":"")+ru(Math.abs(n),Math.abs(n)%1?1:0)+" %";
function downloadExcel(filename, headers, rows){
  let html='<table border="1"><tr>'+headers.map(h=>'<th>'+h+'</th>').join('')+'</tr>';
  rows.forEach(r=>{ html+='<tr>'+r.map(c=>'<td>'+c+'</td>').join('')+'</tr>'; });
  html+='</table>';
  const blob=new Blob(['﻿<html><head><meta charset="utf-8"></head><body>'+html+'</body></html>'],{type:'application/vnd.ms-excel'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}

function Card({title, subtitle, gen, col, right, children, tight}){
  return (
    <div className={"card"+(tight?" tight":"")+(col?" c"+col:"")}>
      {(title||right) && <div className="ch">
        <div>{title && <h3>{title}{gen && <span className="star">*</span>}</h3>}{subtitle && <p>{subtitle}</p>}</div>
        {right}
      </div>}
      {children}
      {gen && <p className="footnote">{GEN_NOTE}</p>}
    </div>
  );
}
function Chip({tone, children}){ return <span className={"chip ch-"+(tone||"gray")}>{children}</span>; }
function DChip({d, unit, betterUp, label}){
  if(d==null) return null;
  const good = d===0?null:((d>0)===betterUp);
  const tone = good==null?"gray":good?"green":"red";
  const arrow = d>0?"↑":d<0?"↓":"→";
  const sign = d>0?"+":d<0?"−":"";
  return <span className={"chip ch-"+tone}>{arrow} {sign}{ru(Math.abs(d),Math.abs(d)%1?1:0)}{unit}{label?" "+label:""}</span>;
}
function KCard({title, value, gen, chips, note, col}){
  return (
    <div className={"kcard"+(col?" c"+col:"")}>
      <div className="kt"><span>{title}</span></div>
      <div className="kv">{value}{gen && <span className="star">*</span>}</div>
      {chips && <div className="kchips">{chips}</div>}
      {note && <div className="knote">{note}</div>}
    </div>
  );
}
function Recs({items}){
  const tm={red:["var(--red-soft)","var(--red-ink)","РИСК"],amber:["var(--amber-soft)","var(--amber-ink)","ВНИМАНИЕ"],
    green:["var(--green-soft)","var(--green-ink)","РОСТ"],blue:["var(--blue-soft)","var(--blue-ink)","ДЕЙСТВИЕ"]};
  return <div>{items.map((r,i)=>{const t=tm[r.tone]||tm.blue;
    return <div className="rec" key={i}><span className="rtag" style={{background:t[0],color:t[1]}}>{r.tag||t[2]}</span><div>{r.text}</div></div>;})}</div>;
}

/* ===================== ЭТАП 1 · ЮНИТ-ЭКОНОМИКА ===================== */
function S1_Unit(){
  const [sku,setSku]=useState(UNIT_ECON_GEN[0].sku);
  const [q,setQ]=useState("");
  const found=UNIT_ECON_GEN.filter(x=>x.sku.toLowerCase().includes(q.trim().toLowerCase()));
  const u=UNIT_ECON_GEN.find(x=>x.sku===sku);
  const holds=u.commission+u.logistics+u.ads+u.acquiring;
  const payout=u.price-holds;
  const profit=payout-u.cost;
  const marginPct=profit/u.price*100;
  const seg=[
    { l:"Себестоимость", v:u.cost, c:"#0F1419" },
    { l:"Комиссия МП", v:u.commission, c:"#FF4D4F" },
    { l:"Логистика", v:u.logistics, c:"#F4B740" },
    { l:"Реклама", v:u.ads, c:"#8B5CF6" },
    { l:"Эквайринг", v:u.acquiring, c:"#9AA0A8" },
    { l:"Прибыль", v:Math.max(profit,0), c:"#10B981" },
  ];
  const exportXls=()=>{
    const headers=["SKU","Цена ₽","Удержания ₽","Выплата ₽","Себестоимость ₽","Прибыль/ед ₽","Маржа %"];
    const rows=UNIT_ECON_GEN.map(x=>{const h=x.commission+x.logistics+x.ads+x.acquiring,p=x.price-h,pr=p-x.cost;
      return [x.sku,x.price,h,p,x.cost,pr,(pr/x.price*100).toFixed(1).replace('.',',')];});
    downloadExcel("unit-economics-arta.xls", headers, rows);
  };
  return (
    <div className="grid">
      <Card col={12} gen title="Разбор цены по товару" subtitle="из чего складывается прибыль с единицы"
        right={<div style={{display:'flex',gap:9,flexWrap:'wrap'}}>
          <input className="sel" style={{minWidth:230}} type="text" placeholder="поиск товара…" value={q} onChange={e=>setQ(e.target.value)}/>
          <select className="sel" value={sku} onChange={e=>setSku(e.target.value)}>
            {found.map((x,i)=><option key={i} value={x.sku}>{x.sku}</option>)}
          </select>
        </div>}>
        <div className="compbar">
          {seg.filter(s=>s.v>0).map((s,i)=>(
            <div key={i} className="seg" style={{flex:s.v,background:s.c}} title={s.l+": "+s.v+" ₽"}>{s.v>=10?s.v+" ₽":""}</div>))}
        </div>
        <div className="leg">{seg.map((s,i)=>(<span key={i}><i style={{background:s.c}}/>{s.l} · {ru(s.v)} ₽</span>))}</div>
        {profit<0 && <div className="rec" style={{marginTop:12,background:"var(--red-soft)"}}><span className="rtag" style={{background:"#fff",color:"var(--red-ink)"}}>УБЫТОК</span>
          <div>Выплата после МП ({ru(payout)} ₽) ниже себестоимости ({ru(u.cost)} ₽) — минус {ru(Math.abs(profit))} ₽ с единицы.</div></div>}
      </Card>

      <div className="c12"><div className="krow n4" style={{marginBottom:0}}>
        <KCard gen title="Цена розничная" value={rub(u.price)} note="цена на площадке"/>
        <KCard gen title="Удержания МП" value={rub(holds)} note={"≈ "+Math.round(holds/u.price*100)+"% от цены"} chips={<Chip tone="amber">внимание</Chip>}/>
        <KCard gen title="Выплата после МП" value={rub(payout)} note="приходит на счёт"/>
        <KCard gen title="Прибыль с единицы" value={(profit>0?"+":"")+rub(profit)} note={"маржа "+ru(marginPct,1)+" %"}
          chips={profit<0?<Chip tone="red">убыток</Chip>:marginPct<8?<Chip tone="amber">на грани</Chip>:<Chip tone="green">норма</Chip>}/>
      </div></div>

      <Card col={12} gen title="Сводная по всем SKU" subtitle="цена, удержания, выплата, себестоимость и прибыль с единицы"
        right={<button className="btn" onClick={exportXls}>{I.dl}Скачать Excel</button>}>
        <table>
          <thead><tr><th>SKU</th><th className="num">Цена</th><th className="num">Удержания</th><th className="num">Выплата</th><th className="num">Себест.</th><th className="num">Прибыль/ед</th><th className="num">Маржа</th><th>Статус</th></tr></thead>
          <tbody>
            {UNIT_ECON_GEN.map((x,i)=>{
              const h=x.commission+x.logistics+x.ads+x.acquiring, p=x.price-h, pr=p-x.cost, m=pr/x.price*100;
              return <tr key={i} className={pr<0?"row-warn":""}>
                <td style={{fontWeight:700}}>{x.sku}</td><td className="num">{ru(x.price)} ₽</td><td className="num">{ru(h)} ₽</td><td className="num">{ru(p)} ₽</td><td className="num">{ru(x.cost)} ₽</td>
                <td className="num"><b style={{color:pr<0?'var(--red)':'var(--green)'}}>{pr>0?"+":""}{ru(pr)} ₽</b></td>
                <td className="num">{ru(m,1)} %</td>
                <td>{pr<0?<Chip tone="red">убыток</Chip>:m<8?<Chip tone="amber">на грани</Chip>:<Chip tone="green">прибыль</Chip>}</td>
              </tr>;})}
          </tbody>
        </table>
      </Card>
    </div>
  );
}

/* ===================== ЭТАП 3 · СИМУЛЯТОР ЦЕНЫ ===================== */
function S3_Sim(){
  const [d,setD]=useState(0);
  const S=PRICE_SIM_GEN;
  const calc=(x)=>{
    const price=S.basePrice*(1+x/100), marginAbs=price-S.baseCost, marginPct=marginAbs/price*100;
    const volume=Math.max(0,S.baseVolume*(1+S.elasticity*(x/100)));
    return {price, marginAbs, marginPct, volume, revenue:price*volume, profit:marginAbs*volume};
  };
  const cur=calc(d), baseProfit=calc(0).profit;
  const profitDelta=(cur.profit-baseProfit)/baseProfit*100;
  const curve=[]; for(let x=-30;x<=30;x+=5){const c=calc(x);curve.push({price:Math.round(c.price),profit:+(c.profit/1e6).toFixed(3)});}
  const scen=[-10,0,10,20].map(x=>({d:x, ...calc(x)}));
  return (
    <div className="grid">
      <Card col={12} gen title="Симулятор цены" subtitle="последствия изменения цены до того, как менять её на площадке">
        <div className="slidehead">
          <div style={{fontSize:13.5,color:'var(--muted)',fontWeight:600}}>Товар: <b style={{color:'var(--ink)'}}>{S.product}</b> · цена {ru(S.basePrice)} ₽ · себестоимость {ru(S.baseCost)} ₽</div>
          <div className="big">{d>0?"+":""}{ru(d)} %</div>
        </div>
        <input type="range" min="-30" max="30" step="1" value={d} onChange={e=>setD(Number(e.target.value))} style={{marginTop:10}}/>
        <div className="krow n4" style={{marginTop:16,marginBottom:0}}>
          <KCard title="Новая цена" value={ru(cur.price)+" ₽"} note={"было "+ru(S.basePrice)+" ₽"}/>
          <KCard title="Маржа" value={ru(cur.marginPct,1)+" %"} chips={<Chip tone="green">точный расчёт</Chip>} note={ru(cur.marginAbs)+" ₽ с единицы"}/>
          <KCard title="Прогноз оборота" value={ru(Math.round(cur.volume))+" шт"} chips={<Chip tone="amber">оценка *</Chip>} note={"было "+ru(S.baseVolume)+" шт"}/>
          <KCard title="Прибыль / мес" value={mln(cur.profit/1e6,2)} chips={<DChip d={+profitDelta.toFixed(1)} unit="%" betterUp={true} label="к базе"/>}/>
        </div>
        <div style={{...chartBox(230),marginTop:18}}>
          <ResponsiveContainer>
            <LineChart data={curve} margin={{top:6,right:12,left:-10,bottom:0}}>
              <CartesianGrid {...grid}/>
              <XAxis type="number" dataKey="price" tick={ax} stroke="#B6BBC4" unit=" ₽" domain={['dataMin','dataMax']} tickLine={false} axisLine={false}/>
              <YAxis tick={ax} stroke="#B6BBC4" unit=" млн" tickLine={false} axisLine={false}/>
              <Tooltip contentStyle={tipStyle} formatter={(v)=>[mln(v,2),"Прибыль / мес"]} labelFormatter={(l)=>"Цена "+ru(l)+" ₽"}/>
              <ReferenceLine x={Math.round(cur.price)} stroke="#0F1419" strokeDasharray="5 5" label={{value:"текущая",position:"top",fontSize:11,fill:"#0F1419"}}/>
              <Line type="monotone" dataKey="profit" stroke="#10B981" strokeWidth={3} dot={{r:3}}/>
            </LineChart>
          </ResponsiveContainer>
        </div>
        <div className="grouphdr">Сценарии</div>
        <table>
          <thead><tr><th>Сценарий</th><th className="num">Цена</th><th className="num">Маржа</th><th className="num">Оборот / мес *</th><th className="num">Прибыль / мес *</th></tr></thead>
          <tbody>
            {scen.map((s,i)=>(
              <tr key={i} style={s.d===0?{background:"var(--hairsoft)"}:{}}>
                <td style={{fontWeight:800}}>{s.d===0?"Текущая":(s.d>0?"+":"")+s.d+" %"}</td>
                <td className="num">{ru(s.price)} ₽</td><td className="num">{ru(s.marginPct,1)} %</td>
                <td className="num">{mln(s.revenue/1e6,2)}</td><td className="num"><b>{mln(s.profit/1e6,2)}</b></td>
              </tr>))}
          </tbody>
        </table>
        <p className="footnote">Маржа — точный расчёт (цена − себестоимость). Оборот и прибыль — оценка по коэффициенту эластичности ({S.elasticity}); точность вырастет на реальных данных продаж.</p>
      </Card>
    </div>
  );
}

function App(){
  const [stage,setStage]=useState(1);
  const [subKey,setSubKey]=useState("home");
  const stageObj=STAGES.find(s=>s.id===stage);
  const subObj=stageObj.subs.find(s=>s.key===subKey) || stageObj.subs[0];
  const Active=subObj.C;
  const selectStage=(id)=>{ setStage(id); setSubKey(STAGES.find(s=>s.id===id).subs[0].key); window.scrollTo(0,0); };
  const go=(stageId,key)=>{ setStage(stageId); setSubKey(key); window.scrollTo(0,0); };
  return (
    <div className="shell">
      {/* левая панель — этапы */}
      <div className="rail">
        {STAGES.map(s=>(
          <button key={s.id} className={"railbtn"+(stage===s.id?" active":"")} onClick={()=>selectStage(s.id)}>
            {s.icon}<span className="railnum">{s.id}</span><span className="tip">{s.name}</span>
          </button>))}
        <div style={{flex:1,minHeight:30}}/>
        <button className="railbtn" title="Поддержка">{I.head}<span className="tip">Поддержка Vileo</span></button>
      </div>

      {/* верхняя панель */}
      <div className="topbar">
        <div className="logo">АГ</div>
        <div className="nav">
          {stageObj.subs.map(sb=>(
            <button key={sb.key} className={"navpill"+(subKey===sb.key?" active":"")} onClick={()=>{setSubKey(sb.key);window.scrollTo(0,0);}}>
              {sb.name}{sb.gen && <span className="ast">*</span>}
            </button>))}
        </div>
        <div className="search">{I.search}Найти SKU, канал, отчёт…<span className="kbd">⌘K</span></div>
        <div className="live"><span className="dot"/>Live</div>
        <div className="avatars">
          {[["АК","var(--lime)","var(--lime-ink)"],["МС","var(--blue-soft)","var(--blue-ink)"],["ЕГ","var(--red-soft)","var(--red-ink)"],["+5","var(--ink)","#fff"]].map(([t,bg,fg],i)=>(
            <div key={i} className="ava" style={{background:bg,color:fg}}>{t}</div>))}
        </div>
        <button className="iconbtn">{I.bell}<span className="reddot"/></button>
        <button className="iconbtn">{I.mail}</button>
        <div className="profile">ИП</div>
      </div>

      {/* хлебные крошки + шапка раздела */}
      <div className="crumbs">
        Главная <span>›</span> <b>{stageObj.name}</b> <span>›</span> {subObj.crumb}
        <span className="sync"><i/>Синхр. 2 мин назад</span>
      </div>
      <div className="pagehead">
        <h1>{subObj.name}{subObj.gen && <span className="star" style={{fontSize:'.45em'}}>*</span>}
          <span className="limebadge"><i/>{subObj.badge}</span></h1>
        <div className="headctl">
          <div className="datepill">{I.cal}Янв — Май 2026 ▾</div>
          <button className="exportbtn">{I.dl}Экспорт отчёта</button>
        </div>
      </div>

      <Active go={go}/>

      <p className="pgnote">Значения и разделы со звёздочкой (*) — сгенерированные данные для демонстрации макета. Остальные показатели — из отчётности Арта Групп.<br/>Цвета каналов едины по всему дашборду: Ozon — синий · Wildberries — сиреневый · Яндекс Маркет — жёлтый.</p>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
